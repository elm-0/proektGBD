<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Taking App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="authContainer" class="auth-container">
            <div class="auth-form" id="loginForm">
                <h2>Login</h2>
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button onclick="login()">Login</button>
                <p>Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
            </div>
            
            <div class="auth-form" id="registerForm" style="display:none">
                <h2>Register</h2>
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <input type="email" id="regEmail" placeholder="Email (optional)">
                <button onclick="register()">Register</button>
                <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
            </div>
        </div>

        <!-- Main App -->
        <div id="appContainer" style="display:none">
            <div class="header">
                <h1>My Notes</h1>
                <div class="user-info">
                    <span id="currentUser"></span>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search notes">
                <button onclick="searchNotes()">Search</button>
                <button onclick="clearSearch()">Clear</button>
            </div>
            
            <div class="tags-section">
                <h3>Filter by Tags</h3>
                <div id="tagsList" class="tags-list"></div>
                <button onclick="clearTagFilter()" class="clear-filter-btn">Clear Filter</button>
            </div>
            
            <button onclick="showCreateModal()" class="create-btn">+ Create New Note</button>
            
            <div class="notes-grid" id="notesGrid"></div>
        </div>

        <div id="noteModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle">Create Note</h2>
                <input type="text" id="noteTitle" placeholder="Title">
                <textarea id="noteText" placeholder="Write your note here" rows="10"></textarea>
                
                <div class="tags-input-container">
                    <label>Tags (ex. work, to do):</label>
                    <input type="text" id="noteTags" placeholder="">
                    <div class="tags-preview" id="tagsPreview"></div>
                </div>
                
                <div id="shareSection" style="display:none">
                    <h3>Share with others</h3>
                    <div class="share-controls">
                        <input type="text" id="shareUsername" placeholder="Username to share with">
                        <button onclick="shareNote()">Share</button>
                    </div>
                    <div id="sharedUsers"></div>
                </div>
                <div class="modal-buttons">
                    <button onclick="saveNote()">Save</button>
                    <button onclick="closeModal()">Cancel</button>
                    <button id="deleteBtn" onclick="deleteNote()" class="delete-btn" style="display:none">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
